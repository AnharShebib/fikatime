<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FikaTime ☕</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="background"></div>

  <main class="layout">
    <section class="card">

      <header class="card-header">
        <h1 class="logo">☕ FikaTime</h1>
        <p class="subtitle">Är det dags för fika?</p>
      </header>

      <div class="content">
        <div id="status" class="status"></div>
        <div id="result" class="result">Laddar…</div>
        <div id="countdown" class="countdown"></div>

        <button id="checkInBtn" class="btn" style="display:none;">
          Checka in ☕
        </button>

        <div id="steam" class="steam" style="display:none;">
          ☁️ ☁️ ☁️
        </div>
      </div>

      <div id="raceContainer" class="race" style="display:none;">
        <div class="track">
          <span class="finish">🏁</span>
          <div id="cupWrap" class="cupWrap">
            <div class="cup">☕</div>
          </div>
        </div>
        <div class="race-text">Fika‑race startar 14:45</div>
      </div>

      <footer class="footer">
      
      </footer>

    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
